name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 检查版本变化
        id: check
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          CURRENT="v$(cat VERSION | tr -d ' \n')"
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          if [ "$LAST_TAG" = "$CURRENT" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "版本未变化，跳过发布"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "版本变更: $LAST_TAG → $CURRENT"
          fi

      - name: 生成 Changelog
        if: steps.check.outputs.changed == 'true'
        run: |
          LAST_TAG="${{ steps.check.outputs.last_tag }}"
          if [ -n "$LAST_TAG" ]; then
            git log "$LAST_TAG..HEAD" --oneline --no-merges --pretty=format:"- %s" > /tmp/changelog.md
          else
            git log --oneline --no-merges --pretty=format:"- %s" > /tmp/changelog.md
          fi
          echo "Changelog 已生成 ($(wc -l < /tmp/changelog.md) 条)"

      - name: 创建 Release
        if: steps.check.outputs.changed == 'true'
        run: |
          VERSION="${{ steps.check.outputs.current }}"
          NOTES="/tmp/release-notes.md"
          echo "## 更新内容" > "$NOTES"
          echo "" >> "$NOTES"
          cat /tmp/changelog.md >> "$NOTES" 2>/dev/null || echo "- 初始版本" >> "$NOTES"
          echo "" >> "$NOTES"
          echo "---" >> "$NOTES"
          echo "## 安装" >> "$NOTES"
          echo "" >> "$NOTES"
          echo '```bash' >> "$NOTES"
          echo "curl -sSL https://raw.githubusercontent.com/geek-fun/moli-skills/$VERSION/install.sh | bash" >> "$NOTES"
          echo '```' >> "$NOTES"

          gh release create "$VERSION" \
            --title "moli-skills $VERSION" \
            --notes-file "$NOTES" \
            ./install.sh ./requirements.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
