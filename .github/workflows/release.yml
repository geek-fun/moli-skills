name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 读取版本号
        id: version
        run: |
          V=$(cat VERSION | tr -d ' \n')
          echo "version=v$V" >> $GITHUB_OUTPUT
          echo "Current version: v$V"

      - name: 检查版本变化
        id: check
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          CURRENT="v$(cat VERSION | tr -d ' \n')"
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          if [ "$LAST_TAG" = "$CURRENT" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "版本未变化，跳过发布"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "版本变更: $LAST_TAG → $CURRENT"
          fi

      - name: 生成 Changelog
        if: steps.check.outputs.changed == 'true'
        uses: jaywcjlove/changelog-generator@main
        id: changelog
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 创建 Release
        if: steps.check.outputs.changed == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "$VERSION" \
            --title "moli-skills $VERSION" \
            --notes "${{ steps.changelog.outputs.changelog }}

          ## 安装

          \`\`\`bash
          curl -sSL https://raw.githubusercontent.com/geek-fun/moli-skills/$VERSION/install.sh | bash
          \`\`\`

          更新内容见: ${{ steps.changelog.outputs.compareurl }}" \
            ./install.sh ./requirements.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
